  <text y="106" font-family="monospace" font-size="9" fill="#555"><tspan x="388">strain1.tsv</tspan><tspan x="460">mcr_2</tspan><tspan x="530">0</tspan><tspan x="580">1.61</tspan></text>
  <line x1="385" y1="114" x2="675" y2="114" stroke="#ddd" stroke-width="0.5" stroke-dasharray="4,3"/>
