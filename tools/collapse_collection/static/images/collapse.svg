  <text y="154" font-family="monospace" font-size="9" fill="#888"><tspan x="30">seq_name</tspan><tspan x="90">median</tspan><tspan x="130">mean</tspan><tspan x="162">...</tspan></text>
  <text y="166" font-family="monospace" font-size="9" fill="#888"><tspan x="30">mcr_1</tspan><tspan x="90">85</tspan><tspan x="130">85.62</tspan></text>
  <text y="178" font-family="monospace" font-size="9" fill="#888"><tspan x="30">mcr_2</tspan><tspan x="90">0</tspan><tspan x="130">3.05</tspan></text>
