  <text x="290" y="128" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#888">header + names</text>
  <rect x="370" y="30" width="320" height="180" rx="8" ry="8" fill="#fff" stroke="#aaa" stroke-width="1" filter="url(#shadow)"/>
  <text x="530" y="50" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#333">Output: A single dataset</text>
  <text y="72" font-family="monospace" font-size="9" font-weight="bold" fill="#333"><tspan x="388">Sample</tspan><tspan x="460">seq_name</tspan><tspan x="530">median</tspan><tspan x="580">mean</tspan></text>
