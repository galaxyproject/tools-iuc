categories:
- Sequence Analysis
- Metagenomics
description: Fast tool for MinHash sketching, comparing, and searching of biological sequences
long_description: |
  sourmash is a command-line tool and Python library for computing MinHash sketches
  from DNA sequences, comparing them to each other, and plotting the results.
  It supports sketch-based sequence comparison, taxonomic classification of
  metagenome-assembled genomes, and rapid database search. Wrappers cover the
  sketch, compare, search, index, prefetch, multigather, plot, signature
  manipulation, and tax subcommands.
name: sourmash
owner: iuc
homepage_url: https://sourmash.readthedocs.io/en/latest/
remote_repository_url: https://github.com/galaxyproject/tools-iuc/tree/main/tools/sourmash
type: unrestricted
auto_tool_repositories:
  name_template: "{{ tool_id }}"
  description_template: "Wrapper for sourmash: {{ tool_name }}."
suite:
  name: "suite_sourmash"
  description: "A suite of Galaxy tools for sourmash sequence sketching and analysis."
  type: repository_suite_definition
