categories:
- Sequence Analysis
- Metagenomics
description: Fast, robust ANI calculation for genome assemblies and MAGs.
long_description: |
  skani is a program for calculating average nucleotide identity (ANI) and
  aligned fraction (AF) between DNA sequences (contigs, MAGs, genomes) above
  ~80% ANI. It is much faster than BLAST-based methods and remains accurate for
  incomplete and medium-quality metagenome-assembled genomes (MAGs), where
  pure sketching methods such as Mash tend to underestimate ANI.
name: skani
owner: iuc
homepage_url: https://github.com/bluenote-1577/skani
remote_repository_url: https://github.com/galaxyproject/tools-iuc/tree/main/tools/skani
type: unrestricted
auto_tool_repositories:
  name_template: "{{ tool_id }}"
  description_template: "Wrapper for skani: {{ tool_name }}."
suite:
  name: "suite_skani"
  description: "A suite of Galaxy tools for skani: fast ANI computation for genomes and MAGs."
  type: repository_suite_definition
