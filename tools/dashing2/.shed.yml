name: dashing2
owner: iuc
homepage_url: https://github.com/dnbaker/dashing2
remote_repository_url: https://github.com/galaxyproject/tools-iuc/tree/main/tools/dashing2
description: k-mer based tool for sketching and comparison of genomic sequences
long_description: dashing2 is a fast toolkit for k-mer and minimizer sketching, all-pairs
  comparison, and KNN-graph construction over genomic sequence collections, using
  SetSketch and locality-sensitive hashing.
categories:
- Sequence Analysis
- Metagenomics
type: unrestricted
auto_tool_repositories:
  name_template: "{{ tool_id }}"
  description_template: "Wrapper for the dashing2 tool: {{ tool_name }}."
suite:
  name: "suite_dashing2"
  description: "A suite of dashing2 tools for k-mer sketching and comparison."
  type: repository_suite_definition