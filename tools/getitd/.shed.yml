categories:
- Sequence Analysis
- Variant Analysis
description: Detection of FLT3 internal tandem duplications (ITDs) from amplicon NGS data
long_description: |
  getITD detects and characterises FLT3 internal tandem duplications (ITDs) from
  high-throughput amplicon sequencing data, supporting minimal residual disease
  monitoring in acute myeloid leukemia. Reads are aligned to a wild-type amplicon
  reference, insertions are detected, merged and filtered, and ITDs are reported
  together with their variant allele frequency and genomic / protein annotation.
