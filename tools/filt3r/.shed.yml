categories:
- Sequence Analysis
- Variant Analysis
description: Alignment-free detection of internal (tandem) duplications in raw sequencing data (FLT3-ITD)
long_description: |
  FiLT3r detects and quantifies internal duplications in raw high-throughput
  sequencing data using an alignment-free, resource-frugal k-mer approach. It was
  designed and benchmarked for FLT3 internal tandem duplication (FLT3-ITD)
  detection and quantification from capture and RNA-Seq data, and ships a
  ready-to-use FLT3 exon 14-15 reference. Reads (FASTA/FASTQ, optionally gzipped)
  are matched against a reference and breakpoints are reported as JSON, with
  duplication size, coverage and variant allele frequency, and optionally as VCF.
