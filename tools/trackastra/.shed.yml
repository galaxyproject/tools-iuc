name: trackastra
owner: galaxyproject
description: Track cell instances in time-lapse movies using deep learning
long_description: |
  Trackastra is a deep learning-based tool for tracking cell instances in time-lapse microscopy images.
  It combines Cellpose for automatic cell segmentation with a transformer-based tracking model.
  
  Features:
  - Automatic cell segmentation using Cellpose
  - Accurate cell tracking across time
  - Support for 2D+time and 3D+time data
  - Configurable downscaling for large images
  - Output compatible with Napari visualization

