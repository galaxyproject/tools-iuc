name: trackastra
owner: iuc
description: Transformer-based cell tracking for live-cell microscopy
homepage_url: https://github.com/weigertlab/trackastra
long_description: |
  Galaxy wrapper for the Trackastra track command. It links existing instance
  segmentations over time and returns association edges, a Cell Tracking
  Challenge track table, and tracked masks. A companion export tool prepares the CTC results for Napari and external visualization workflows.
remote_repository_url: https://github.com/galaxyproject/tools-iuc/tree/main/tools/trackastra
categories:
  - Imaging
  - Machine Learning
