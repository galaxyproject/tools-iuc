<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 200" width="580" height="200">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="110%" height="110%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feComponentTransfer in="blur"><feFuncA type="linear" slope="0.3"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>
  <!-- Left: list collection -->
  <rect x="10" y="10" width="170" height="160" rx="8" ry="8" fill="#d9ead3" stroke="#888" stroke-width="1" filter="url(#shadow)"/>
  <text x="95" y="28" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#333">Input: A collection</text>
  <rect x="22" y="38" width="146" height="28" rx="4" ry="4" fill="#fff" stroke="#aaa" stroke-width="0.7"/>
  <text x="46" y="56" font-family="monospace" font-size="11" font-weight="bold" fill="#555">sample_A</text>
  <rect x="22" y="74" width="146" height="28" rx="4" ry="4" fill="#fff" stroke="#aaa" stroke-width="0.7"/>
  <text x="46" y="92" font-family="monospace" font-size="11" font-weight="bold" fill="#555">sample_B</text>
  <rect x="22" y="110" width="146" height="28" rx="4" ry="4" fill="#fff" stroke="#aaa" stroke-width="0.7"/>
  <text x="46" y="128" font-family="monospace" font-size="11" font-weight="bold" fill="#555">sample_C</text>
  <text x="95" y="155" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#888">element identifiers shown in bold</text>
  <!-- Arrow -->
  <line x1="195" y1="90" x2="305" y2="90" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="250" y="80" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#555">Extract</text>
  <!-- Right: text output -->
  <rect x="320" y="30" width="150" height="120" rx="8" ry="8" fill="#fff" stroke="#aaa" stroke-width="1" filter="url(#shadow)"/>
  <text x="395" y="48" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#333">Output: txt</text>
  <text x="340" y="72" font-family="monospace" font-size="11" fill="#555">sample_A</text>
  <text x="340" y="90" font-family="monospace" font-size="11" fill="#555">sample_B</text>
  <text x="340" y="108" font-family="monospace" font-size="11" fill="#555">sample_C</text>
  <!-- Annotation -->
  <text x="290" y="192" text-anchor="middle" font-family="sans-serif" font-size="10" font-style="italic" fill="#666">one identifier per line, in collection order</text>
</svg>
