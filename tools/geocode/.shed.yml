name: nlp_geocode_entities
owner: iuc
description: Geocode named entities from NLP-annotated JSON to GeoJSON
long_description: |
  Extracts location entities (GPE, LOC, FAC, ORG) from NLP-annotated JSON output
  (spaCy or Stanza) and geocodes them using Nominatim (OpenStreetMap). Produces
  GeoJSON output viewable with Galaxy's OpenLayers visualization plugin, plus
  a tabular summary of geocoded locations with coordinates and mention counts.
homepage_url: https://github.com/galaxyproject/tools-iuc/tree/main/tools/geocode
remote_repository_url: https://github.com/galaxyproject/tools-iuc/tree/main/tools/geocode
type: unrestricted
categories:
  - Text Manipulation
  - Natural Language Processing
