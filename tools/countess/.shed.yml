name: countess
owner: iuc
description: Run saved CountESS workflow configurations
homepage_url: https://github.com/CountESS-Project/CountESS
long_description: |
  CountESS is a modular workflow-like tool for tabular and sequence-count analyses.
  This Galaxy wrapper runs an existing CountESS INI configuration saved from the
  CountESS GUI, mapping Galaxy datasets to CountESS input nodes and collecting
  saved output tables.
type: unrestricted
categories:
  - Sequence Analysis
  - Variant Analysis
remote_repository_url: https://github.com/galaxyproject/tools-iuc/tree/main/tools/countess
