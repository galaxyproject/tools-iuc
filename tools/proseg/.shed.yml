name: proseg
owner: iuc
description: Probabilistic cell segmentation for spatial transcriptomics
long_description: |
  ProSeg (probabilistic segmentation) uses a Bayesian MCMC sampler to
  refine transcript-to-cell assignments in spatial transcriptomics data.
  Starting from a prior segmentation, it models RNA diffusion and
  transcript misassignment to improve cell boundaries. Supports 10x
  Xenium, NanoString CosMx, Vizgen MERSCOPE, 10x Visium HD, AnnData,
  and SpatialData formats.
homepage_url: https://github.com/dcjones/proseg
remote_repository_url: https://github.com/galaxyproject/tools-iuc/tree/master/tools/proseg
type: unrestricted
categories:
  - Transcriptomics
  - Single Cell
  - Spatial Omics
