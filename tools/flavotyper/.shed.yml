name: flavotyper
owner: iuc
description: In silico serotyping of Flavobacterium psychrophilum from genome assemblies
long_description: |
  FlavoTyper detects specific biomarkers in a genome assembly to assign its
  Flavobacterium psychrophilum serotype. It verifies the species with fastANI and
  generates reference-versus-sample locus comparison artifacts for resolved calls.
homepage_url: https://forge.inrae.fr/eric.duchaud/flavotyper
remote_repository_url: https://github.com/galaxyproject/tools-iuc/tree/main/tools/flavotyper
type: unrestricted
categories:
  - Sequence Analysis
