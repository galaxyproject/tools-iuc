categories:
- Sequence Analysis
description: Aligning short and accurate long reads to a reference genome, the successor of bwa-mem
long_description: |
  minibwa is a fast read aligner for short reads and accurate long reads. Developed by Heng Li as
  the successor of bwa-mem, it combines BWA-MEM variable-length seeding with minimap2-style chaining
  and base alignment, reaching several times the speed of bwa-mem and bwa-mem2 at comparable accuracy.
