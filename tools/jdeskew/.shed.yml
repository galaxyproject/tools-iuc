categories:
- Imaging
description: Deskew document images using Adaptive Radial Projection on the Fourier Magnitude Spectrum
long_description: |
  jdeskew estimates and corrects the skew angle of document images.
  It uses Adaptive Radial Projection on the Fourier Magnitude Spectrum (ARPFMS)
  to determine the dominant text-line angle without binarisation or line detection,
  then rotates the image to produce a straight output suitable for OCR.
name: jdeskew
owner: iuc
homepage_url: https://github.com/phamquiluan/jdeskew
remote_repository_url: https://github.com/galaxyproject/tools-iuc/tree/main/tools/jdeskew
type: unrestricted
auto_tool_repositories:
  name_template: "{{ tool_id }}"
  description_template: "Wrapper for jdeskew: {{ tool_name }}."
suite:
  name: "suite_jdeskew"
  description: "Galaxy tool for document image deskewing with jdeskew."
  type: repository_suite_definition
