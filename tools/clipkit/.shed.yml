name: clipkit
owner: iuc
description: Trim multiple sequence alignments while retaining phylogenetically informative sites
long_description: |
  ClipKIT is a fast and flexible tool for trimming multiple sequence alignments.
  It removes sites that are unlikely to be phylogenetically informative while
  retaining the signal needed for accurate phylogenetic inference.
categories:
- Phylogenetics
- Sequence Analysis
homepage_url: https://jlsteenwyk.com/ClipKIT/
remote_repository_url: https://github.com/galaxyproject/tools-iuc/tree/main/tools/clipkit
type: unrestricted
