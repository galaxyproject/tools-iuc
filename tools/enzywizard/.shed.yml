categories:
- Enzyme Engineering
- Protein Structure
description: A suite of Galaxy tools for enzyme analysis and engineering using EnzyWizard.
long_description: |
  EnzyWizard is a collection of tools for enzyme analysis, including structure cleaning,
  property calculation, docking, interaction analysis, and graph integration.
  This suite provides Galaxy wrappers for all EnzyWizard command-line tools.
homepage_url: https://github.com/bioinfbrad/enzywizard
name: enzywizard
owner: iuc
remote_repository_url: https://github.com/bioinfbrad/tools-iuc/tree/main/tools/enzywizard
auto_tool_repositories:
  name_template: "{{ tool_id }}"
  description_template: "Wrapper for EnzyWizard {{ tool_name }}."
suite:
  name: "suite_enzywizard"
  description: "A suite of Galaxy tools designed to work with the EnzyWizard python library."
  type: repository_suite_definition
