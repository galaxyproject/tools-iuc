description: EASTR detects and removes spuriously spliced alignments from RNA-seq data
homepage_url: https://github.com/ishinder/eastr-cpp
long_description: |
  EASTR (Emending Alignments of Spliced Transcript Reads) identifies and removes
  spuriously spliced alignments from RNA-seq datasets. Splice-aware aligners such
  as HISAT2 and STAR can introduce erroneous spliced alignments between repeated
  sequences, leading to falsely spliced transcripts in downstream assembly and
  quantification. EASTR examines the sequence similarity between the regions
  flanking an intron and the frequency of those sequences in the reference genome
  to detect junctions that are likely artifacts, regardless of the aligner used.
  It accepts BAM, GTF or BED input and can emit a filtered BAM together with the
  spurious junctions it removed.
name: eastr
owner: iuc
