categories:
- Imaging
- Text Manipulation
description: Page dewarping and thresholding of document images using a cubic sheet model
long_description: |
  page-dewarp takes a photograph of a document page (often curved or warped due
  to paper or binding) and produces a flattened, thresholded image suitable for
  OCR or archival. It estimates page geometry by fitting a cubic sheet model to
  the detected text spans and then remaps the original image to a flat plane.
